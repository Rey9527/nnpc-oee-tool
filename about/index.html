<script>window.NNPC_PAGE={about:{zh:{title:'從真實工廠經驗出發的智慧製造顧問。',intro:'N/NPC 的母企業在泰國北欖工業區經營工廠超過 30 年，專精複雜貼合代工製程。我們不是只談系統功能，而是把效率、毛利、交期、原物料與現場執行一起放進改善設計。',pill1:'泰國北欖 30 年製造背景',pill2:'複雜貼合代工與數位轉型經驗',pill3:'電子、金屬、塑膠等 20 年顧問經驗',sideTitle:'N/NPC 的角色',side1:'懂工廠現場，也懂經營數字',side2:'協助企業選型、導入與整合原廠解決方案',side3:'把 MES、IoT、AI、RTLS 與流程平台串成可執行改善',side4:'以交期、毛利、效率與透明度衡量成果',b1t:'我們不是從簡報開始，而是從工廠開始',b1p:'母企業長期在泰國北欖工業區營運，面對過多製程、多材料、多工序與交期壓力。透過數位升級，我們更精準掌握產能、原物料、在製進度與異常，讓效率和毛利改善不只停留在口號。',b2t:'複雜製程讓我們知道資料為什麼會失真',b2p:'貼合加工常見的問題不是單一設備，而是工序切換、人工回報、材料批次、重工與良率彼此牽動。這讓我們在看其他產業時，會特別重視資料來源、填報行為與管理節奏。',b2l1:'用實際開機、產出、良率與用電等訊號交叉檢查現場狀態。',b2l2:'讓日夜班、人員填表、工單進度和異常原因變得可比較。',b2l3:'把改善目標連回毛利、交期承諾和庫存資金，而不只看單一 KPI。',b3t:'顧問群具備跨產業輔導經驗',b3p:'我們的顧問群在電子、金屬加工、塑膠射出、壓鑄與相關製造領域累積多達 20 年的輔導經驗。這讓 N/NPC 能判斷哪些問題適合先做 MES，哪些要先補 IoT 資料，哪些可以導入 AI 或 RTLS 形成下一階段能力。',b3l1:'電子與高精密製造：製程參數、品質追溯、設備異常與產能瓶頸。',b3l2:'金屬、塑膠與壓鑄：工單節拍、模具/設備狀態、良率與換線損失。',b3l3:'管理與流程平台：CRM、表單、知識管理、跨部門流程與現場閉環。',methodTitle:'我們相信技術要回到現場與營運',methodText:'好的系統不是功能最多，而是能讓管理者看見問題、做出決策、追蹤改善，並讓現場願意每天使用。',s1:'理解現場',s1p:'先看流程、資料、角色與真正卡住的地方。',s2:'選型整合',s2p:'依需求導入適合的原廠技術與系統組合。',s3:'陪跑改善',s3p:'用顧問節奏、報表與檢討機制讓改善持續發生。',ctaTitle:'想知道你的工廠應該先補哪一塊？',ctaText:'我們可以從 OEE、交期、良率、設備資料、庫存與現場流程開始，協助你判斷第一個最值得做的改善點。',ctaBtn:'聯絡 N/NPC'},en:{title:'Smart manufacturing consulting grounded in real factory operations.',intro:'N/NPC comes from a parent manufacturing business with more than 30 years of factory operation in Samut Prakan, Thailand, specializing in complex lamination contract manufacturing. We do not start with feature lists. We connect efficiency, margin, delivery, material control, and shopfloor execution into one improvement design.',pill1:'30+ years of manufacturing roots in Samut Prakan',pill2:'Complex lamination and digital transformation experience',pill3:'20+ years of consulting experience across electronics, metal, and plastics',sideTitle:'What N/NPC brings',side1:'Factory reality and business numbers in the same conversation',side2:'Solution selection, implementation, and vendor integration',side3:'MES, IoT, AI, RTLS, and workflow platforms connected into execution',side4:'Measured by delivery, margin, efficiency, and visibility',b1t:'We do not start from slides. We start from factories.',b1p:'Our parent business has operated in Samut Prakan for decades, dealing with multi-process, multi-material, and delivery-sensitive production. Through digital upgrading, the factory gained better control over capacity, materials, WIP, and exceptions, turning efficiency and margin improvement into operating practice.',b2t:'Complex processes teach us why data becomes unreliable',b2p:'In lamination and contract manufacturing, problems rarely sit in one machine. Changeovers, manual reporting, material lots, rework, and yield all influence each other. That is why we pay close attention to data sources, reporting behavior, and management cadence when working with other industries.',b2l1:'Cross-check site status with machine runtime, output, yield, power, and other signals.',b2l2:'Make day/night shift performance, manual reports, work order progress, and abnormal reasons comparable.',b2l3:'Connect improvement goals back to margin, delivery promises, and inventory cash, not only a single KPI.',b3t:'Consultants with cross-industry implementation experience',b3p:'Our consulting team has up to 20 years of experience supporting electronics, metal processing, plastic injection, die casting, and related manufacturing operations. This helps N/NPC decide what should start with MES, what needs IoT data first, and where AI or RTLS can become the next capability.',b3l1:'Electronics and high-precision manufacturing: process parameters, quality traceability, equipment anomalies, and capacity bottlenecks.',b3l2:'Metal, plastics, and die casting: work order rhythm, mold/equipment status, yield, and changeover loss.',b3l3:'Management and process platforms: CRM, forms, knowledge management, cross-functional workflow, and shopfloor closure.',methodTitle:'Technology must return to operations',methodText:'A good system is not the one with the most features. It is the one that helps managers see issues, make decisions, track improvement, and lets teams use it every day.',s1:'Understand the site',s1p:'Review workflows, data, roles, and where work truly gets stuck.',s2:'Select and integrate',s2p:'Introduce appropriate original technologies and system combinations based on need.',s3:'Improve together',s3p:'Use consulting cadence, dashboards, and review routines to sustain improvement.',ctaTitle:'Want to know what your factory should improve first?',ctaText:'We can start from OEE, delivery, yield, machine data, inventory, and workflow to identify the first improvement point worth doing.',ctaBtn:'Contact N/NPC'},th:{title:'ที่ปรึกษา Smart Manufacturing ที่เริ่มจากประสบการณ์โรงงานจริง',intro:'N/NPC มีรากฐานจากบริษัทแม่ที่ดำเนินโรงงานในนิคมอุตสาหกรรมสมุทรปราการ ประเทศไทย มากกว่า 30 ปี และเชี่ยวชาญงานรับจ้างผลิตกระบวนการ laminating ที่ซับซ้อน เราไม่ได้เริ่มจากรายการฟังก์ชัน แต่เชื่อม efficiency, gross margin, delivery, material control และ shopfloor execution ให้เป็นแผนปรับปรุงเดียวกัน',pill1:'พื้นฐานการผลิต 30+ ปีในสมุทรปราการ',pill2:'ประสบการณ์ complex lamination และ digital transformation',pill3:'ประสบการณ์ที่ปรึกษา 20+ ปีใน electronics, metal, plastics',sideTitle:'บทบาทของ N/NPC',side1:'เข้าใจหน้างานและตัวเลขธุรกิจพร้อมกัน',side2:'ช่วยเลือก solution, implementation และ vendor integration',side3:'เชื่อม MES, IoT, AI, RTLS และ workflow platforms ให้ทำงานได้จริง',side4:'วัดผลด้วย delivery, margin, efficiency และ visibility',b1t:'เราไม่ได้เริ่มจากสไลด์ แต่เริ่มจากโรงงาน',b1p:'บริษัทแม่ของเราดำเนินงานในสมุทรปราการมาอย่างยาวนาน ต้องรับมือกับการผลิตหลายขั้นตอน หลายวัสดุ และแรงกดดันด้านกำหนดส่งมอบ ผ่านการยกระดับด้วยดิจิทัล โรงงานสามารถควบคุม capacity, material, WIP และ abnormal ได้แม่นยำขึ้น ทำให้ efficiency และ margin improvement กลายเป็นการปฏิบัติจริง',b2t:'กระบวนการที่ซับซ้อนทำให้เราเข้าใจว่าทำไม data จึงคลาดเคลื่อน',b2p:'ในงาน lamination และ contract manufacturing ปัญหาไม่ได้อยู่ที่เครื่องจักรเดียว แต่เกี่ยวข้องกับ changeover, manual reporting, material lot, rework และ yield ที่กระทบกัน เราจึงให้ความสำคัญกับ data source, reporting behavior และ management cadence เป็นพิเศษ',b2l1:'ตรวจสอบสถานะหน้างานด้วย machine runtime, output, yield, power และสัญญาณอื่นร่วมกัน',b2l2:'ทำให้ day/night shift, manual reports, work order progress และ abnormal reasons เปรียบเทียบกันได้',b2l3:'เชื่อมเป้าหมายการปรับปรุงกลับไปที่ margin, delivery promise และ inventory cash ไม่ใช่แค่ KPI เดียว',b3t:'ทีมที่ปรึกษามีประสบการณ์ข้ามอุตสาหกรรม',b3p:'ทีมที่ปรึกษาของเรามีประสบการณ์สูงสุด 20 ปีในการสนับสนุน electronics, metal processing, plastic injection, die casting และ manufacturing operations ที่เกี่ยวข้อง ทำให้ N/NPC ช่วยตัดสินได้ว่าปัญหาใดควรเริ่มจาก MES ปัญหาใดต้องเสริม IoT data ก่อน และจุดใดสามารถต่อยอดเป็น AI หรือ RTLS ได้',b3l1:'Electronics และ high-precision manufacturing: process parameters, quality traceability, equipment anomalies และ capacity bottlenecks',b3l2:'Metal, plastics และ die casting: work order rhythm, mold/equipment status, yield และ changeover loss',b3l3:'Management และ process platforms: CRM, forms, knowledge management, cross-functional workflow และ shopfloor closure',methodTitle:'เทคโนโลยีต้องกลับไปสู่หน้างานและการดำเนินงาน',methodText:'ระบบที่ดีไม่ใช่ระบบที่มีฟังก์ชันมากที่สุด แต่คือระบบที่ทำให้ผู้บริหารเห็นปัญหา ตัดสินใจ ติดตามการปรับปรุง และทีมใช้งานได้ทุกวัน',s1:'เข้าใจหน้างาน',s1p:'ดู workflow, data, roles และจุดที่งานติดจริง',s2:'เลือกและบูรณาการ',s2p:'นำเทคโนโลยีและระบบที่เหมาะสมมาใช้ตามความต้องการ',s3:'ปรับปรุงร่วมกัน',s3p:'ใช้จังหวะที่ปรึกษา dashboard และการ review เพื่อให้การปรับปรุงต่อเนื่อง',ctaTitle:'อยากรู้ว่าโรงงานควรเริ่มปรับปรุงจุดไหนก่อน?',ctaText:'เราเริ่มได้จาก OEE, delivery, yield, machine data, inventory และ workflow เพื่อหาจุดแรกที่คุ้มค่าที่สุดในการปรับปรุง',ctaBtn:'ติดต่อ N/NPC'}}};</script><script src="../assets/site.js"></script></body></html>
