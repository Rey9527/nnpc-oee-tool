<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N/NPC Privacy Policy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Sans+Thai:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#1C1C1C; --surface:#242424; --text:#F4F4F4; --muted:#B6B6B6; --gold:#E1A813; --border:rgba(255,255,255,0.1); }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:'Noto Sans TC','Barlow',sans-serif; line-height:1.75; padding:32px 18px; }
  body.thai { font-family:'Noto Sans Thai','Barlow',sans-serif; }
  main { max-width:860px; margin:0 auto; background:var(--surface); border:1px solid var(--border); padding:34px; border-radius:2px; }
  a { color:var(--gold); text-decoration:none; }
  .topbar { display:flex; justify-content:space-between; gap:1rem; align-items:center; margin-bottom:24px; }
  .brand { font-family:'Barlow',sans-serif; font-weight:700; letter-spacing:.05em; font-size:1.35rem; }
  .brand span { color:var(--gold); }
  .lang-bar { display:flex; gap:.35rem; flex-wrap:wrap; justify-content:flex-end; }
  .lang-btn { background:#2C2C2C; border:1px solid var(--border); color:var(--muted); padding:.36rem .7rem; border-radius:2px; cursor:pointer; font:600 .82rem 'Barlow',sans-serif; }
  .lang-btn.active { color:var(--gold); border-color:rgba(225,168,19,.42); background:rgba(225,168,19,.12); }
  h1 { font-size:1.85rem; margin:0 0 10px; }
  h2 { font-size:1.12rem; margin:28px 0 8px; color:var(--gold); }
  p, li { color:var(--muted); font-size:1rem; }
  ul { padding-left:1.2rem; }
  .meta { color:#9C9C9C; font-size:.94rem; margin-bottom:28px; }
  .back { display:inline-block; margin-top:28px; font-weight:700; }
  @media (max-width:560px) { main { padding:24px 18px; } .topbar { align-items:flex-start; flex-direction:column; } .lang-bar { justify-content:flex-start; } }
</style>
</head>
<body>
<main>
  <div class="topbar">
    <div class="brand">N<span>/</span>NPC</div>
    <div class="lang-bar">
      <button class="lang-btn" onclick="setLang('zh')">中文</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('th')">ไทย</button>
    </div>
  </div>

  <h1 id="title"></h1>
  <p class="meta" id="meta"></p>
  <div id="content"></div>
  <a class="back" href="register.html" id="back"></a>
</main>

<script>
const T = {
  zh: {
    htmlLang:'zh-TW', bodyClass:'',
    title:'隱私權政策',
    meta:'最後更新：2026-05-13',
    back:'← 返回 OEE 工具註冊頁',
    content: `
      <p>N/NPC 會保護您在使用 OEE 工具與會員註冊流程中提供的資料。本政策說明我們收集哪些資料、如何使用，以及您可以如何聯絡我們。</p>
      <h2>我們收集的資料</h2>
      <ul><li>姓名、公司名稱、Email。</li><li>您主動提供的電話、職稱、國家等資料。</li><li>註冊時間、語言偏好、工具申請來源。</li></ul>
      <h2>資料使用目的</h2>
      <ul><li>寄送 OEE 工具連結與會員相關通知。</li><li>確認工具使用權限與防止濫用。</li><li>提供 OEE、IoT、MES 或智慧製造相關顧問聯繫。</li><li>改善網站、表單與工具體驗。</li></ul>
      <h2>第三方服務</h2><p>我們可能使用 Airtable 儲存會員資料，並使用 Resend 寄送 Email。這些服務僅用於上述營運目的。</p>
      <h2>資料保存與安全</h2><p>我們會採取合理方式保護資料，並限制 API Key 與系統權限。若資料已不再需要，您可以要求我們刪除或更新。</p>
      <h2>您的權利</h2><p>您可以要求查詢、更正或刪除您的會員資料，也可以要求停止接收後續聯繫。</p>
      <h2>聯絡我們</h2><p>如有隱私相關問題，請透過 N/NPC 官方網站或業務窗口與我們聯繫。</p>`
  },
  en: {
    htmlLang:'en', bodyClass:'',
    title:'Privacy Policy',
    meta:'Last updated: 2026-05-13',
    back:'← Back to OEE tool registration',
    content: `
      <p>N/NPC protects the information you provide when registering for and using the OEE tool. This policy explains what we collect, how we use it, and how you can contact us.</p>
      <h2>Information We Collect</h2>
      <ul><li>Name, company name, and Email address.</li><li>Optional phone number, job title, department, and country.</li><li>Registration time, language preference, and tool request source.</li></ul>
      <h2>How We Use Information</h2>
      <ul><li>To send the OEE tool link and member-related messages.</li><li>To verify tool access and prevent misuse.</li><li>To contact you about OEE, IoT, MES, or smart manufacturing consulting.</li><li>To improve the website, forms, and tool experience.</li></ul>
      <h2>Third-Party Services</h2><p>We may use Airtable to store member records and Resend to send Email. These services are used only for the operating purposes described above.</p>
      <h2>Retention and Security</h2><p>We take reasonable measures to protect data and limit API key and system access. You may request deletion or correction when the data is no longer needed.</p>
      <h2>Your Rights</h2><p>You may request to access, correct, or delete your member data, or ask us to stop contacting you.</p>
      <h2>Contact</h2><p>For privacy-related questions, please contact N/NPC through the official website or your business contact.</p>`
  },
  th: {
    htmlLang:'th', bodyClass:'thai',
    title:'นโยบายความเป็นส่วนตัว',
    meta:'อัปเดตล่าสุด: 2026-05-13',
    back:'← กลับไปหน้าลงทะเบียนเครื่องมือ OEE',
    content: `
      <p>N/NPC ให้ความสำคัญกับการปกป้องข้อมูลที่คุณให้ไว้เมื่อสมัครและใช้งานเครื่องมือ OEE นโยบายนี้อธิบายว่าเราเก็บข้อมูลอะไร ใช้อย่างไร และคุณสามารถติดต่อเราได้อย่างไร</p>
      <h2>ข้อมูลที่เราเก็บ</h2>
      <ul><li>ชื่อ ชื่อบริษัท และ Email</li><li>เบอร์โทร ตำแหน่ง แผนก และประเทศที่คุณให้เพิ่มเติม</li><li>เวลาลงทะเบียน ภาษา และแหล่งที่มาของการขอใช้เครื่องมือ</li></ul>
      <h2>วัตถุประสงค์การใช้ข้อมูล</h2>
      <ul><li>ส่งลิงก์เครื่องมือ OEE และข้อความเกี่ยวกับสมาชิก</li><li>ยืนยันสิทธิ์การใช้งานและป้องกันการใช้งานผิดวัตถุประสงค์</li><li>ติดต่อเกี่ยวกับคำปรึกษาด้าน OEE, IoT, MES หรือ Smart Manufacturing</li><li>ปรับปรุงเว็บไซต์ แบบฟอร์ม และประสบการณ์การใช้งาน</li></ul>
      <h2>บริการภายนอก</h2><p>เราอาจใช้ Airtable เพื่อจัดเก็บข้อมูลสมาชิก และใช้ Resend เพื่อส่ง Email โดยใช้เพื่อวัตถุประสงค์การให้บริการเท่านั้น</p>
      <h2>การเก็บรักษาและความปลอดภัย</h2><p>เราจะใช้มาตรการที่เหมาะสมในการปกป้องข้อมูล และจำกัดการเข้าถึง API Key และระบบ คุณสามารถขอให้แก้ไขหรือลบข้อมูลได้เมื่อไม่จำเป็นต้องใช้อีกต่อไป</p>
      <h2>สิทธิ์ของคุณ</h2><p>คุณสามารถขอเข้าถึง แก้ไข หรือลบข้อมูลสมาชิกของคุณ และขอหยุดรับการติดต่อเพิ่มเติมได้</p>
      <h2>ติดต่อเรา</h2><p>หากมีคำถามเกี่ยวกับความเป็นส่วนตัว กรุณาติดต่อ N/NPC ผ่านเว็บไซต์ทางการหรือผู้ติดต่อทางธุรกิจของคุณ</p>`
  }
};

function detectLang() {
  const saved = localStorage.getItem('nnpc_lang');
  if (saved && T[saved]) return saved;
  const lang = (navigator.language || '').toLowerCase();
  if (lang.startsWith('th')) return 'th';
  if (lang.startsWith('zh')) return 'zh';
  return 'en';
}
function setLang(lang) {
  const t = T[lang] || T.en;
  localStorage.setItem('nnpc_lang', lang);
  document.documentElement.lang = t.htmlLang;
  document.body.className = t.bodyClass;
  document.getElementById('title').textContent = t.title;
  document.getElementById('meta').textContent = t.meta;
  document.getElementById('content').innerHTML = t.content;
  document.getElementById('back').textContent = t.back;
  document.querySelectorAll('.lang-btn').forEach((btn, i) => btn.classList.toggle('active', ['zh','en','th'][i] === lang));
}
setLang(detectLang());
</script>
</body>
</html>
