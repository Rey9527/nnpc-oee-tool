    content: `
      <p>N/NPC 會保護您在使用 N/NPC 官方網站、會員內容、OEE 工具、RTLS / 空間服務診斷工具、證書驗證頁面與聯絡表單時提供的資料。本政策說明我們收集哪些資料、如何使用，以及您可以如何聯絡我們。</p>
      <h2>我們收集的資料</h2>
      <ul><li>姓名、公司名稱、Email、電話、職稱、國家、語言偏好與您主動提供的聯絡資料。</li><li>會員註冊、工具申請、登入連結驗證、表單送出時間與來源頁面。</li><li>OEE、RTLS / 空間服務診斷、案例分析或顧問需求表單中由您填寫的工廠、場域、設備、人員、資產、應用需求、預算或專案時程等資訊。</li><li>證書驗證所需的資料，例如證書 ID、姓名、職稱、課程或實習計畫、期間、發證日期與狀態。</li><li>瀏覽器、裝置、IP 位址、參照來源、錯誤紀錄與安全紀錄等基本技術資訊。</li></ul>
      <h2>資料使用目的</h2>

      <h2>第三方服務</h2><p>我們可能使用 Airtable 儲存表單、會員、工具申請與證書紀錄，使用 Resend 或其他 Email 服務寄送通知，並使用 Vercel 等服務託管網站與 API。這些服務僅用於上述營運目的。必要時，我們也可能將您主動提供的需求資訊分享給合作原廠或服務夥伴，以便評估方案或安排服務；我們不會出售您的個人資料。</p>
      <h2>資料保存與安全</h2><p>我們會採取合理方式保護資料，並限制 API Key、管理者 token 與系統權限。一般聯絡、會員與工具申請資料會在商業聯繫、服務提供或法定需求所需期間內保存；證書與驗證紀錄可能為了長期驗證目的而保存較長時間。若資料已不再需要，您可以要求我們刪除或更新。</p>
      <h2>您的權利</h2><p>您可以要求查詢、更正或刪除您的個人資料，也可以要求停止接收後續聯繫。部分證書或交易紀錄可能因驗證、會計、合約或法律需求而需要保留。</p>
      <h2>政策更新</h2><p>隨著 N/NPC 網站、工具與會員內容擴充，我們可能更新本政策。新版政策會公布於本頁。</p>

      <p>N/NPC protects the information you provide when using the N/NPC official website, member content, OEE tool, RTLS / spatial service assessment tool, certificate verification pages, and contact forms. This policy explains what we collect, how we use it, and how you can contact us.</p>
      <h2>Information We Collect</h2>
      <ul><li>Name, company name, email address, phone number, job title, country, language preference, and other contact details you choose to provide.</li><li>Member registration, tool requests, access-link verification, form submission time, and source page.</li><li>Factory, site, equipment, personnel, asset, application requirement, budget, and project timeline information submitted through OEE, RTLS / spatial service assessment, case insight, or consulting forms.</li><li>Certificate verification data, such as certificate ID, recipient name, position, program, period, issue date, and status.</li><li>Basic technical information such as browser, device, IP address, referrer, error logs, and security logs.</li></ul>
      <h2>How We Use Information</h2>
      <ul><li>To send tool links, member messages, certificate verification links, and requested materials.</li><li>To verify access to tools, member-only content, and admin pages, and to prevent misuse, fraud, or unauthorized access.</li><li>To evaluate OEE, MES, IoT, RTLS, AI predictive maintenance, enterprise AI, or other consulting needs and arrange follow-up communication.</li><li>To create, update, revoke, and verify certificates or credentials issued by N/NPC.</li><li>To improve the website, forms, tools, language content, and user experience.</li><li>To support contracts, customer service, internal operations, security, and legal compliance.</li></ul>
      <h2>Third-Party Services</h2><p>We may use Airtable to store form, member, tool request, and certificate records; Resend or other email services to send notifications; and Vercel or similar services to host the website and APIs. These services are used only for the operating purposes described above. When necessary, we may share requirement information you voluntarily provide with original solution vendors or service partners to evaluate solutions or arrange service. We do not sell your personal data.</p>
      <h2>Retention and Security</h2><p>We take reasonable measures to protect data and limit API key, admin token, and system access. Contact, member, and tool request records are retained as long as needed for business follow-up, service delivery, or legal requirements. Certificate and verification records may be retained longer for long-term credential verification. You may request deletion or correction when the data is no longer needed.</p>
      <h2>Your Rights</h2><p>You may request to access, correct, or delete your personal data, or ask us to stop contacting you. Some certificate or transaction records may need to be retained for verification, accounting, contractual, or legal purposes.</p>
      <h2>Policy Updates</h2><p>As the N/NPC website, tools, and member content expand, we may update this policy. The latest version will be posted on this page.</p>
      <h2>Contact</h2><p>For privacy-related questions, please contact N/NPC at <a href="mailto:info@nnpc.ai">info@nnpc.ai</a>.</p>`

    content: `
      <p>N/NPC ให้ความสำคัญกับการปกป้องข้อมูลที่คุณให้ไว้เมื่อใช้งานเว็บไซต์ทางการของ N/NPC เนื้อหาสำหรับสมาชิก เครื่องมือ OEE เครื่องมือประเมิน RTLS / Spatial Service หน้าตรวจสอบใบรับรอง และแบบฟอร์มติดต่อ นโยบายนี้อธิบายว่าเราเก็บข้อมูลอะไร ใช้อย่างไร และคุณสามารถติดต่อเราได้อย่างไร</p>
      <h2>ข้อมูลที่เราเก็บ</h2>

      <h2>วัตถุประสงค์การใช้ข้อมูล</h2>
      <ul><li>ส่งลิงก์เครื่องมือ ข้อความสำหรับสมาชิก ลิงก์ตรวจสอบใบรับรอง และข้อมูลที่คุณร้องขอ</li><li>ยืนยันสิทธิ์การใช้งานเครื่องมือ เนื้อหาสำหรับสมาชิก และหน้า admin รวมถึงป้องกันการใช้งานผิดวัตถุประสงค์ การฉ้อโกง หรือการเข้าถึงโดยไม่ได้รับอนุญาต</li><li>ประเมินความต้องการด้าน OEE, MES, IoT, RTLS, AI Predictive Maintenance, Enterprise AI หรือบริการที่ปรึกษาอื่น และติดต่อกลับ</li><li>สร้าง แก้ไข เพิกถอน และตรวจสอบใบรับรองหรือ credential ที่ออกโดย N/NPC</li><li>ปรับปรุงเว็บไซต์ แบบฟอร์ม เครื่องมือ เนื้อหาภาษา และประสบการณ์ผู้ใช้</li><li>สนับสนุนสัญญา บริการลูกค้า การดำเนินงานภายใน ความปลอดภัย และการปฏิบัติตามกฎหมาย</li></ul>
      <h2>บริการภายนอก</h2><p>เราอาจใช้ Airtable เพื่อจัดเก็บข้อมูลแบบฟอร์ม สมาชิก การขอใช้เครื่องมือ และใบรับรอง ใช้ Resend หรือบริการ Email อื่นเพื่อส่งข้อความ และใช้ Vercel หรือบริการลักษณะเดียวกันเพื่อโฮสต์เว็บไซต์และ API บริการเหล่านี้ใช้เพื่อวัตถุประสงค์การดำเนินงานที่ระบุไว้เท่านั้น เมื่อจำเป็น เราอาจแบ่งปันข้อมูลความต้องการที่คุณให้โดยสมัครใจกับผู้ผลิตโซลูชันหรือพันธมิตรบริการ เพื่อประเมินโซลูชันหรือจัดบริการ เราไม่ขายข้อมูลส่วนบุคคลของคุณ</p>
      <h2>การเก็บรักษาและความปลอดภัย</h2><p>เราจะใช้มาตรการที่เหมาะสมในการปกป้องข้อมูล และจำกัดการเข้าถึง API Key, admin token และระบบ ข้อมูลติดต่อ สมาชิก และการขอใช้เครื่องมือจะถูกเก็บเท่าที่จำเป็นสำหรับการติดต่อทางธุรกิจ การให้บริการ หรือข้อกำหนดทางกฎหมาย ข้อมูลใบรับรองและการตรวจสอบอาจถูกเก็บไว้นานขึ้นเพื่อการยืนยัน credential ระยะยาว คุณสามารถขอให้แก้ไขหรือลบข้อมูลได้เมื่อไม่จำเป็นต้องใช้อีกต่อไป</p>

      <h2>การอัปเดตนโยบาย</h2><p>เมื่อเว็บไซต์ เครื่องมือ และเนื้อหาสำหรับสมาชิกของ N/NPC ขยายตัว เราอาจอัปเดตนโยบายนี้ โดยเวอร์ชันล่าสุดจะแสดงอยู่ในหน้านี้</p>
      <h2>ติดต่อเรา</h2><p>หากมีคำถามเกี่ยวกับความเป็นส่วนตัว กรุณาติดต่อ N/NPC ที่ <a href="mailto:info@nnpc.ai">info@nnpc.ai</a></p>`
  }
};

function detectLang() {
  const saved = localStorage.getItem('nnpc_lang');
  if (saved && T[saved]) return saved;
  const lang = (navigator.language || '').toLowerCase();
  if (lang.startsWith('th')) return 'th';
  if (lang.startsWith('zh')) return 'zh';
  return 'en';
}
function setLang(lang) {
  const t = T[lang] || T.en;
  localStorage.setItem('nnpc_lang', lang);
  document.documentElement.lang = t.htmlLang;
  document.body.className = ['legal-page', t.bodyClass].filter(Boolean).join(' ');
  document.getElementById('title').textContent = t.title;
  document.getElementById('meta').textContent = t.meta;
  document.getElementById('content').innerHTML = t.content;
  document.querySelectorAll('.legal-back').forEach((link) => {
    link.textContent = t.back;
    link.href = location.protocol === 'file:' ? 'register.html' : '/oee/register.html';
  });
  document.querySelectorAll('.lang-btn').forEach((btn, i) => btn.classList.toggle('active', ['zh','en','th'][i] === lang));
}
setLang(detectLang());
</script>
