<script>window.NNPC_PAGE={ai:{zh:{title:'AI 不只用在工廠，也能用在企業預測、最佳化與決策輔助。',intro:'N/NPC 可依需求導入 PROFET AI、AI 預防維護與各類預測模型，讓資料不只被看見，而是參與決策。',sideTitle:'應用場景',b1t:'PROFET AI 作為 no-code AI 預測與最佳化平台',b1p:'PROFET AI 已應用於台灣高階製造與電子供應鏈，也可延伸至需求、庫存、營運、品質與決策輔助場景。',s1:'常見症狀：有很多資料，但不知道該預測什麼',s1p:'N/NPC 會先協助定義商業問題，例如良率、交期、庫存、需求或設備風險。',s2:'常見症狀：AI 專案很好看，但沒有落到流程',s2p:'模型需要連到使用者決策、驗證節奏與改善行動。',b2t:'AI 預防維護先講結果，再談產品',b2p:'對工廠主來說，重點是降低非預期停機與維修成本。依現場需求，可導入 Smart Tag 等 AI 預防維護方案。',b3t:'模型要接近營運，而不是只做展示',b3p:'我們協助定義預測目標、資料來源、驗證方式與導入流程，避免 AI 只停在簡報。',o1:'預測更早',o1p:'在問題變成損失前提出風險訊號。',o2:'決策更快',o2p:'讓現場與管理層看到同一個建議。',o3:'導入更聚焦',o3p:'先做資料足、金額大、能落地的場景。',ctaTitle:'想知道哪個 AI 場景最值得先做？',ctaText:'從資料可用性、損失金額和導入難度一起評估。'},en:{title:'AI is not limited to factories. It can support prediction, optimization, and enterprise decisions.',intro:'N/NPC can introduce PROFET AI, AI predictive maintenance, and prediction models based on your use case, helping data participate in decisions.',sideTitle:'Use cases',b1t:'PROFET AI as a no-code prediction and optimization platform',b1p:'PROFET AI is adopted in advanced manufacturing and electronics supply chains in Taiwan, and can extend to demand, inventory, operations, quality, and decision-support scenarios.',s1:'Common symptom: lots of data, but no clear prediction target',s1p:'N/NPC first helps define the business problem, such as yield, delivery, inventory, demand, or equipment risk.',s2:'Common symptom: AI looks good but does not enter workflow',s2p:'Models must connect to user decisions, validation cadence, and improvement actions.',b2t:'Predictive maintenance should lead with business outcome',b2p:'For factory owners, the point is reducing unplanned downtime and maintenance cost. N/NPC can introduce Smart Tag and related AI predictive maintenance solutions as needed.',b3t:'AI models must stay close to operations',b3p:'We help define prediction targets, data sources, validation, and rollout so AI does not remain a demo.',o1:'Predict earlier',o1p:'Surface risk signals before issues become losses.',o2:'Decide faster',o2p:'Give field teams and managers the same recommendation.',o3:'Focus rollout',o3p:'Start with use cases that have data, value, and adoption potential.',ctaTitle:'Which AI use case should come first?',ctaText:'Evaluate data readiness, loss value, and implementation difficulty together.'},th:{title:'AI ไม่ได้จำกัดอยู่แค่โรงงาน แต่ช่วยพยากรณ์ เพิ่มประสิทธิภาพ และสนับสนุนการตัดสินใจขององค์กรได้',intro:'N/NPC สามารถนำ PROFET AI, AI predictive maintenance และโมเดลพยากรณ์มาใช้ตามกรณีใช้งาน เพื่อให้ข้อมูลมีบทบาทในการตัดสินใจ',sideTitle:'กรณีใช้งาน',b1t:'PROFET AI สำหรับ no-code prediction และ optimization',b1p:'PROFET AI ใช้ในอุตสาหกรรมการผลิตขั้นสูงและซัพพลายเชนอิเล็กทรอนิกส์ของไต้หวัน และขยายสู่ demand, inventory, operations, quality และ decision support ได้',s1:'อาการที่พบบ่อย: มีข้อมูลมาก แต่ไม่รู้ว่าจะพยากรณ์อะไร',s1p:'N/NPC ช่วยกำหนด business problem เช่น yield, delivery, inventory, demand หรือ equipment risk ก่อน',s2:'อาการที่พบบ่อย: AI ดูดี แต่ไม่เข้า workflow',s2p:'โมเดลต้องเชื่อมกับการตัดสินใจของผู้ใช้ จังหวะ validation และ action ในการปรับปรุง',b2t:'Predictive maintenance ต้องเริ่มจากผลลัพธ์ทางธุรกิจ',b2p:'สำหรับเจ้าของโรงงาน จุดสำคัญคือการลด downtime ที่ไม่คาดคิดและต้นทุนซ่อมบำรุง โดยสามารถนำ Smart Tag หรือโซลูชันที่เกี่ยวข้องมาใช้ตามความต้องการ',b3t:'โมเดล AI ต้องอยู่ใกล้การดำเนินงาน',b3p:'เราช่วยกำหนดเป้าหมาย แหล่งข้อมูล วิธีตรวจสอบ และการนำไปใช้ เพื่อไม่ให้ AI เป็นแค่เดโม',o1:'พยากรณ์เร็วขึ้น',o1p:'ส่งสัญญาณความเสี่ยงก่อนกลายเป็นความสูญเสีย',o2:'ตัดสินใจเร็วขึ้น',o2p:'ให้หน้างานและผู้บริหารเห็นคำแนะนำเดียวกัน',o3:'เริ่มอย่างโฟกัส',o3p:'เริ่มจาก use case ที่มีข้อมูล มีมูลค่า และนำไปใช้ได้จริง',ctaTitle:'ควรเริ่ม AI จากกรณีไหนก่อน?',ctaText:'ประเมินจากความพร้อมของข้อมูล มูลค่าความสูญเสีย และความยากในการนำไปใช้พร้อมกัน'}}};</script><script src="../../assets/site.js"></script></body></html>
