<script>window.NNPC_PAGE={ai:{zh:{title:'AI 不只用在工廠，也能用在企業預測、最佳化與決策輔助。',intro:'N/NPC 可依需求導入 PROFET AI、AI 預防維護與各類預測模型，讓資料不只被看見，而是參與決策。',sideTitle:'應用場景',b1t:'PROFET AI 作為 no-code AI 預測與最佳化平台',b1p:'PROFET AI 已應用於台灣高階製造與電子供應鏈，也可延伸至需求、庫存、營運、品質與決策輔助場景。',b2t:'AI 預防維護先講結果，再談產品',b2p:'對工廠主來說，重點是降低非預期停機與維修成本。依現場需求，可導入 Smart Tag 等 AI 預防維護方案。',b3t:'模型要接近營運，而不是只做展示',b3p:'我們協助定義預測目標、資料來源、驗證方式與導入流程，避免 AI 只停在簡報。',ctaTitle:'想知道哪個 AI 場景最值得先做？',ctaText:'從資料可用性、損失金額和導入難度一起評估。'},en:{title:'AI is not limited to factories. It can support prediction, optimization, and enterprise decisions.',intro:'N/NPC can introduce PROFET AI, AI predictive maintenance, and prediction models based on your use case, helping data participate in decisions.',sideTitle:'Use cases',b1t:'PROFET AI as a no-code prediction and optimization platform',b1p:'PROFET AI is adopted in advanced manufacturing and electronics supply chains in Taiwan, and can extend to demand, inventory, operations, quality, and decision-support scenarios.',b2t:'Predictive maintenance should lead with business outcome',b2p:'For factory owners, the point is reducing unplanned downtime and maintenance cost. N/NPC can introduce Smart Tag and related AI predictive maintenance solutions as needed.',b3t:'AI models must stay close to operations',b3p:'We help define prediction targets, data sources, validation, and rollout so AI does not remain a demo.',ctaTitle:'Which AI use case should come first?',ctaText:'Evaluate data readiness, loss value, and implementation difficulty together.'},th:{title:'AI ไม่ได้จำกัดอยู่แค่โรงงาน แต่ช่วยพยากรณ์ เพิ่มประสิทธิภาพ และสนับสนุนการตัดสินใจขององค์กรได้',intro:'N/NPC สามารถนำ PROFET AI, AI predictive maintenance และโมเดลพยากรณ์มาใช้ตามกรณีใช้งาน เพื่อให้ข้อมูลมีบทบาทในการตัดสินใจ',sideTitle:'กรณีใช้งาน',b1t:'PROFET AI สำหรับ no-code prediction และ optimization',b1p:'PROFET AI ใช้ในอุตสาหกรรมการผลิตขั้นสูงและซัพพลายเชนอิเล็กทรอนิกส์ของไต้หวัน และขยายสู่ demand, inventory, operations, quality และ decision support ได้',b2t:'Predictive maintenance ต้องเริ่มจากผลลัพธ์ทางธุรกิจ',b2p:'สำหรับเจ้าของโรงงาน จุดสำคัญคือการลด downtime ที่ไม่คาดคิดและต้นทุนซ่อมบำรุง โดยสามารถนำ Smart Tag หรือโซลูชันที่เกี่ยวข้องมาใช้ตามความต้องการ',b3t:'โมเดล AI ต้องอยู่ใกล้การดำเนินงาน',b3p:'เราช่วยกำหนดเป้าหมาย แหล่งข้อมูล วิธีตรวจสอบ และการนำไปใช้ เพื่อไม่ให้ AI เป็นแค่เดโม',ctaTitle:'ควรเริ่ม AI จากกรณีไหนก่อน?',ctaText:'ประเมินจากความพร้อมของข้อมูล มูลค่าความสูญเสีย และความยากในการนำไปใช้พร้อมกัน'}}};</script><script src="../../assets/site.js"></script></body></html>
