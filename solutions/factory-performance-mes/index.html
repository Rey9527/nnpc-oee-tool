<script>window.NNPC_PAGE={factory:{zh:{title:'讓產線不只會生產，也能說清楚每一小時發生什麼。',intro:'從 MES、OEE 到 IoT 現場數據，N/NPC 協助工廠把機台、人工、品質與產能變成老闆看得懂的營運數字。',sideTitle:'導入範圍',b1t:'先釐清現場資料，不急著套系統',b1p:'我們會先確認工單、機台、停機原因、良率、重工與報表流程，找出真正影響獲利的資料斷點。',s1:'常見症狀：報表有數字，但會議仍在猜原因',s1p:'停機、速度、品質與人員投入如果沒有被同一套語言描述，改善會停在討論。',s2:'常見症狀：一張訂單賺不賺，要等月底才知道',s2p:'N/NPC 會協助把生產過程中的損失前移到日常管理。',b2t:'把 OEE 從指標變成管理語言',b2p:'OEE 不只是百分比，而是讓等待、換線、速度損失、品質損失被量化，進而排出改善優先順序。',b3t:'MES 與 IoT 依現場成熟度分階段導入',b3p:'可以從簡單數據採集、看板、報表開始，再逐步導入完整 MES 流程與跨系統整合。',o1:'看見真實稼動',o1p:'停機與等待不再只靠口頭回報。',o2:'改善有優先順序',o2p:'先做金額最大、阻力最小的項目。',o3:'管理節奏固定',o3p:'讓每日會議有共同數據。',ctaTitle:'先試算 OEE 漏利',ctaText:'讓工廠主先看到效率改善和每月產值之間的關係。',ctaBtn:'前往 OEE 工具'},en:{title:'Make production lines explain what happens every hour.',intro:'From MES and OEE to IoT field data, N/NPC turns machines, labor, quality, and capacity into operating numbers management can understand.',sideTitle:'Scope',b1t:'Clarify field data before installing systems',b1p:'We review work orders, machines, downtime reasons, yield, rework, and reporting flows to find the data gaps that affect profit.',s1:'Common symptom: reports exist, but meetings still guess the cause',s1p:'If downtime, speed, quality, and labor are not described in one language, improvement stays in discussion.',s2:'Common symptom: order profit is only known at month end',s2p:'N/NPC helps move production loss into daily management visibility.',b2t:'Turn OEE into a management language',b2p:'OEE is not just a percentage. It quantifies waiting, changeover, speed loss, and quality loss so teams can prioritize improvement.',b3t:'Phase MES and IoT by site maturity',b3p:'Start with data capture, dashboards, and reports, then expand toward full MES processes and integration.',o1:'See real utilization',o1p:'Downtime and waiting no longer rely only on verbal reports.',o2:'Prioritize improvement',o2p:'Start with the highest value and lowest resistance items.',o3:'Stabilize management cadence',o3p:'Give daily meetings a shared data language.',
