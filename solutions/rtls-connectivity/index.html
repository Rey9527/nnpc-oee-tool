<script>window.NNPC_PAGE={rtls:{zh:{title:'當你不知道人、料、車在哪裡，流程就會靠電話和等待運作。',intro:'N/NPC 可導入 Orion Go RTLS、LoRaWAN、BLE/BLT 與通訊裝置，協助工廠、倉儲與場域掌握即時位置與事件。',sideTitle:'應用範圍',b1t:'RTLS 讓等待和尋找變成可量化事件',b1p:'人員、物料、車輛、治具與設備位置若能即時掌握，就能減少尋找、等待與錯誤移動。',s1:'常見症狀：不是沒做事，是時間花在找東西',s1p:'找料、找車、找人、找工具的時間如果沒有被記錄，就很難被改善。',s2:'常見症狀：異常發生後才開始追原因',s2p:'位置與事件資料可以協助建立即時警示與事後追溯。',b2t:'通訊技術依場域選型',b2p:'依距離、精度、電池、環境與成本，選擇 LoRaWAN、BLE/BLT 或搭配式通訊方案。',b3t:'定位資料要接到流程與管理',b3p:'定位不是只看地圖，而是要連到安全、派工、物流、倉儲與異常事件。',o1:'減少尋找時間',o1p:'把隱形等待轉成可管理事件。',o2:'提升安全與追溯',o2p:'知道事件發生的位置、時間和移動軌跡。',o3:'改善派工與物流',o3p:'讓任務分派依位置和狀態更有效率。',ctaTitle:'先盤點哪些東西最常找不到',ctaText:'從人、料、車、工具或高價設備開始，評估最有價值的追蹤場景。'},en:{title:'When people, materials, and vehicles cannot be located, operations run on calls and waiting.',intro:'N/NPC can introduce Orion Go RTLS, LoRaWAN, BLE/BLT, and connectivity devices to help factories, warehouses, and sites track real-time location and events.',sideTitle:'Applications',b1t:'RTLS turns searching and waiting into measurable events',b1p:'Real-time visibility of people, materials, vehicles, tools, and equipment reduces searching, waiting, and wrong movement.',s1:'Common symptom: time is spent searching, not producing',s1p:'Searching for materials, vehicles, people, and tools must be recorded before it can be improved.',s2:'Common symptom: root cause starts only after incidents happen',s2p:'Location and event data support real-time alerts and post-event traceability.',b2t:'Connectivity should match the site',b2p:'Select LoRaWAN, BLE/BLT, or hybrid communication based on range, accuracy, battery, environment, and cost.',b3t:'Location data must connect to workflows',b3p:'Tracking is not just a map. It should connect to safety, dispatch, logistics, warehouse, and event management.',o1:'Reduce search time',o1p:'Turn invisible waiting into manageable events.',o2:'Improve safety and traceability',o2p:'Know where, when, and how events happened.',o3:'Improve dispatch and logistics',o3p:'Assign tasks more efficiently based on location and status.',ctaTitle:'Start with what gets lost or delayed most often',ctaText:'Assess people, materials, vehicles, tools, or high-value assets to find the highest-value tracking case.'},th:{title:'เมื่อไม่รู้ว่าคน วัตถุดิบ และรถอยู่ที่ไหน งานจะเดินด้วยการโทรถามและการรอ',intro:'N/NPC สามารถนำ Orion Go RTLS, LoRaWAN, BLE/BLT และอุปกรณ์สื่อสารมาใช้ เพื่อช่วยโรงงาน คลังสินค้า และไซต์งานติดตามตำแหน่งและเหตุการณ์แบบเรียลไทม์',sideTitle:'การใช้งาน',b1t:'RTLS ทำให้การค้นหาและการรอกลายเป็นเหตุการณ์ที่วัดได้',b1p:'การเห็นตำแหน่งคน วัตถุดิบ รถ เครื่องมือ และอุปกรณ์แบบเรียลไทม์ช่วยลดการค้นหา การรอ และการเคลื่อนที่ผิด',s1:'อาการที่พบบ่อย: เวลาไม่ได้หายไปกับการผลิต แต่หายไปกับการค้นหา',s1p:'เวลาหาวัตถุดิบ รถ คน และเครื่องมือต้องถูกบันทึกก่อนจึงจะปรับปรุงได้',s2:'อาการที่พบบ่อย: เริ่มหาสาเหตุหลังเกิดเหตุแล้ว',s2p:'ข้อมูลตำแหน่งและ event ช่วยทำ alert แบบ real-time และ traceability หลังเหตุการณ์',b2t:'เทคโนโลยีสื่อสารต้องเหมาะกับพื้นที่',b2p:'เลือก LoRaWAN, BLE/BLT หรือโซลูชันผสมตามระยะ ความแม่นยำ แบตเตอรี่ สภาพแวดล้อม และต้นทุน',b3t:'ข้อมูลตำแหน่งต้องเชื่อมกับ workflow',b3p:'การติดตามไม่ใช่แค่แผนที่ แต่ต้องเชื่อมกับ safety, dispatch, logistics, warehouse และ event management',o1:'ลดเวลาค้นหา',o1p:'เปลี่ยน waiting ที่มองไม่เห็นให้เป็น event ที่จัดการได้',o2:'เพิ่ม safety และ traceability',o2p:'รู้ว่า event เกิดที่ไหน เมื่อไร และเคลื่อนที่อย่างไร',o3:'ปรับปรุง dispatch และ logistics',o3p:'มอบหมายงานตามตำแหน่งและสถานะได้มีประสิทธิภาพขึ้น',ctaTitle:'เริ่มจากสิ่งที่หายหรือช้าที่สุด',ctaText:'ประเมินคน วัตถุดิบ รถ เครื่องมือ หรือสินทรัพย์มูลค่าสูง เพื่อหา use case ที่คุ้มค่าที่สุด'}}};</script><script src="../../assets/site.js"></script></body></html>
